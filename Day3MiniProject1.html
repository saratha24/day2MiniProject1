<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Dashboard</title>
</head>
<body>
    <h1>Income and Expense Dashboard</h1>

        <h2>Key Metrics</h2>
        <figure>
            <img src="https://via.placeholder.com/150" alt="Income">
            <figcaption>Income Overview</figcaption>
        </figure>
        <figure>

            <figcaption>Expense Overview</figcaption>

    <section>

            </thead>
            <tbody>
                <tr>
                    <td>01.03.2026</td>

                    <td>1000</td>
                </tr>
                <tr>
                    <td>02.03.2026</td>
                    <td>veg</td>
                    <td>1200</td>
                </tr>
                <tr>
                    <td>03.03.2026</td>
                    <td>grocery</td>
                    <td>2000</td>
                </tr>
                <tr>
                    <td colspan="2"><strong>Total</strong></td>
                    <td><strong></strong>4200</td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
